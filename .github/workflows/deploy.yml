name: deploy

on:
    workflow_dispatch:
    
permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build
        run: |
          sudo su
          ls -alh
          ip a
          sudo ufw status
          sudo iptables -t nat -I PREROUTING -i eth0 -p udp --dport 53 -j REDIRECT --to-ports 5300
          wget https://github.com/net2share/vaydns/releases/download/v0.2.7/vaydns-server-linux-amd64
          chmod +x vaydns-server-linux-amd64
          ls -alh
          ./vaydns-server-linux-amd64 -gen-key -privkey-file server.key -pubkey-file server.pub
          cat server.pub
          curl -4 ifconfig.me
          ./vaydns-server-* -help
          sudo apt install ncat certbot -y
          ncat -l -k -v 127.0.0.1 8000 &
          sleep 60 & sudo certbot certonly --standalone -d testi.vivatel.ir --agree-tos --email your-email@example.com
          ./vaydns-server-* -udp :5300 -privkey-file server.key -mtu 1000 -domain t.vivatel.ir -upstream 127.0.0.1:8000

          
          pwd
